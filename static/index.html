<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Модульный конструктор писем</title>
  <link rel="stylesheet" href="modular-styles.css">
  <link rel="stylesheet" href="theme-variables.css">
  <link rel="stylesheet" href="figma-gradient-panel.css">
</head>

<body>
  <div class="app-container">
    <!-- Левая панель - Библиотека блоков -->
    <aside class="blocks-library">
      <h2>Библиотека блоков</h2>

      <div class="blocks-grid">
        <button class="block-btn" data-block-type="banner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="M21 15l-5-5L5 21"></path>
          </svg>
          <span>Баннер</span>
        </button>

        <button class="block-btn" data-block-type="text">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3M9 20h6M12 4v16"></path>
          </svg>
          <span>Текст</span>
        </button>

        <button class="block-btn" data-block-type="heading">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 4v8m0 0v8m0-8h12M18 4v16"></path>
          </svg>
          <span>Заголовок</span>
        </button>

        <button class="block-btn" data-block-type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="8" width="18" height="8" rx="2"></rect>
          </svg>
          <span>Кнопка</span>
        </button>

        <button class="block-btn" data-block-type="list">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6"></line>
            <line x1="8" y1="12" x2="21" y2="12"></line>
            <line x1="8" y1="18" x2="21" y2="18"></line>
            <circle cx="4" cy="6" r="1"></circle>
            <circle cx="4" cy="12" r="1"></circle>
            <circle cx="4" cy="18" r="1"></circle>
          </svg>
          <span>Список</span>
        </button>

        <button class="block-btn" data-block-type="expert">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <span>Эксперт</span>
        </button>

        <button class="block-btn" data-block-type="important">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <span>Важно</span>
        </button>

        <button class="block-btn" data-block-type="divider">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
          </svg>
          <span>Разделитель</span>
        </button>

        <button class="block-btn" data-block-type="image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <path d="M21 15l-5-5L5 21"></path>
          </svg>
          <span>Картинка</span>
        </button>

        <button class="block-btn" data-block-type="spacer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          </svg>
          <span>Отступ</span>
        </button>
      </div>

      <div class="action-buttons-group">
        <button id="btn-create-outlook" class="btn-download">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
            </path>
          </svg>
          Создать письмо
        </button>
        <button id="btn-create-meeting" class="btn-download btn-meeting">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Создать встречу
        </button>
        <!-- Убрать эту строку чтобы отключить -->
        <!-- <button class="btn-download" onclick="AdminBulkMail.open()">Массовая рассылка</button> -->
        <button id="btn-exchange-settings" class="btn-save-template btn-exchange-settings-link"
          title="Настройки подключения Exchange">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
          Настройки Exchange
        </button>
      </div>

      <button id="btn-save-template" class="btn-save-template">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
        Сохранить шаблон
      </button>

      <button id="btn-user-resources" type="button" class="btn-save-template btn-user-resources-open" title="Ресурсы">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        Ресурсы
      </button>

    </aside>

    <!-- Центральная панель - Конструктор -->
    <main class="canvas-area">
      <div class="canvas-header">
        <button id="btn-toggle-templates" class="btn-burger" title="Библиотека шаблонов">Шаблоны</button>
        </button>
        <h2>Конструктор письма</h2>
        <div class="canvas-header-actions">
          <button id="btn-preview" type="button" class="btn-preview">Превью</button>
        </div>
      </div>

      <div id="canvas" class="canvas-content">
        <div class="canvas-empty">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          <p>Добавьте блоки из левой панели</p>
        </div>
      </div>
    </main>

    <!-- Правая панель - Настройки блока -->
    <aside class="settings-panel">
      <h2>Настройки блока</h2>
      <div id="settings-content" class="settings-content">
        <div class="settings-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m0-6h6m-6 0H6"></path>
          </svg>
          <p>Выберите блок для настройки</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Модальное окно превью -->
  <div id="preview-modal" class="modal" style="display: none;">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>Превью письма</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div id="preview-container" class="preview-container"></div>
      </div>
      <div class="modal-footer">
        <textarea id="html-output" class="html-output" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </div>

  </div>

  <!-- Панель шаблонов -->
  <div id="templates-panel" class="templates-panel">
    <div class="templates-panel-header">
      <h3>Библиотека шаблонов</h3>
      <div class="templates-search">
        <input type="text" id="templates-search-input" placeholder=" Поиск...">
      </div>
    </div>

    <div class="templates-list" id="templates-list">
      <!-- Список шаблонов будет здесь -->
    </div>

    <div class="templates-panel-footer">
      <button id="btn-clear-canvas" class="btn-secondary">
        🗑️ Очистить холст
      </button>
    </div>
  </div>

  <!-- Затемнение фона -->
  <div id="templates-overlay" class="templates-overlay"></div>

  <!-- Панель личных ресурсов -->
  <div id="user-resources-panel" class="user-resources-panel" aria-label="Ресурсы">
    <div class="ur-panel-header">
      <h3>Ресурсы</h3>
      <button id="user-resources-close" type="button" class="ur-close-btn" title="Закрыть">&times;</button>
    </div>
    <div id="user-resources-body" class="ur-panel-body">
      <!-- Содержимое генерируется в userResources.js -->
    </div>
  </div>
  <div id="user-resources-overlay" class="user-resources-overlay"></div>

  <!-- Подключение модулей в правильном порядке -->

  <!-- 3. Базовая функциональность -->
  <script src="js/blockDefaults.js"></script>
  <script src="js/blockOperations.js"></script>
  <script src="js/columnOperations.js"></script>
  <script src="js/templatesAPI.js"></script>
  <script src="js/templatesUI.js"></script>

  <!-- 4. Drag and Drop -->

  <script src="js/settings/gradientInline.js"></script>

  <script src="js/settings/textSettings.js"></script>

  <script src="js/settings/importantSettings.js"></script>
  <script src="js/settings/dividerSettings.js"></script>
  <script src="js/settings/imageSettings.js"></script>

  <script src="js/settings/columnsSettings.js"></script>

  <!-- 7. Генерация и экспорт -->
  <script src="js/emailGenerator.js"></script>
  <script src="js/outlookIntegration.js"></script>
  <script src="js/modalPreview.js"></script>

  <!-- 8. Личные ресурсы -->

  <!-- 9. Инициализация приложения -->
  <script src="js/main.js"></script>
  <!-- <script src="js/admin-bulk-mail.js"></script> -->
  <!-- Переключатель режима: фиксированная позиция, виден только при can_switch -->
  <div id="mode-switch-widget" class="mode-switch-widget" hidden>
    <label class="mode-switch-track" title="Переключить режим">
      <input type="checkbox" id="mode-switch-checkbox" checked>
      <span class="mode-switch-thumb"></span>
    </label>
    <span class="mode-switch-text" id="mode-switch-label">Администратор</span>
  </div>

  <script>
    (function () {
      async function initModeSwitcher() {
        try {
          const r = await fetch('/api/mode');
          const data = await r.json();
          if (!data.can_switch) return;
          const widget = document.getElementById('mode-switch-widget');
          widget.hidden = false;
          // Текущий режим — admin, чекбокс уже checked
          document.getElementById('mode-switch-checkbox').addEventListener('change', async function () {
            await fetch('/api/mode', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ mode: 'user' }),
            });
            window.location.href = '/user';
          });
        } catch (_) {}
      }
      document.addEventListener('DOMContentLoaded', initModeSwitcher);
    })();

    // Heartbeat — пингуем сервер каждые 5 секунд
    setInterval(() => {
      fetch('/api/heartbeat', { method: 'POST' }).catch(() => {});
    }, 5000);
  </script>
</body>
